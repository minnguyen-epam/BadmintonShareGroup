name: Feature Branch CI

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  security-events: write

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: badminton-share-group

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Format & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24
      - uses: gradle/actions/setup-gradle@v4
      - name: Spotless check
        run: ./gradlew spotlessCheck --no-daemon
      - name: Detekt
        run: ./gradlew detekt --no-daemon

  build-and-unit-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24
      - uses: gradle/actions/setup-gradle@v4
      - name: Build and run unit tests
        run: ./gradlew build -x integrationTest --no-daemon
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: build/reports/tests/
          retention-days: 7

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24
      - uses: gradle/actions/setup-gradle@v4
      - name: Run integration tests
        run: ./gradlew integrationTest --no-daemon
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-reports
          path: build/reports/tests/integrationTest/
          retention-days: 7

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24
      - uses: gradle/actions/setup-gradle@v4
      - name: OWASP dependency check
        run: ./gradlew dependencyCheckAnalyze --no-daemon
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: build/reports/dependency-check-report.sarif

  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, build-and-unit-test, integration-test]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login
      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
