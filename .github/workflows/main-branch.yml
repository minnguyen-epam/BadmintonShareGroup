name: Main Branch CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  id-token: write

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: badminton-share-group
  INFRA_REPO: your-org/badminton-share-group-infra

concurrency:
  group: main-deploy
  cancel-in-progress: false

jobs:
  lint:
    name: Code Format & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24
      - uses: gradle/actions/setup-gradle@v4
      - name: Spotless check
        run: ./gradlew spotlessCheck --no-daemon
      - name: Detekt
        run: ./gradlew detekt --no-daemon

  build-and-test:
    name: Build & All Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24
      - uses: gradle/actions/setup-gradle@v4
      - name: Build, unit tests, and integration tests
        run: ./gradlew build integrationTest --no-daemon
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: build/reports/tests/
          retention-days: 7

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24
      - uses: gradle/actions/setup-gradle@v4
      - name: OWASP dependency check
        run: ./gradlew dependencyCheckAnalyze --no-daemon
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: build/reports/dependency-check-report.sarif

  docker-build-push:
    name: Build, Push & Scan Docker Image
    runs-on: ubuntu-latest
    needs: [lint, build-and-test]
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login
      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$TAG -t $REGISTRY/$ECR_REPOSITORY:latest .
          docker push $REGISTRY/$ECR_REPOSITORY:$TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: dev
    steps:
      - name: Update image tag in infra repo
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPO_PAT }}
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image-tag }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/${{ env.INFRA_REPO }}.git infra
          cd infra/overlays/dev
          kustomize edit set image badminton-share-group=*.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy(dev): update image to ${IMAGE_TAG}"
          git push
